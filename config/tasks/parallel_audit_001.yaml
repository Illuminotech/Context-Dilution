id: parallel_audit_001
type: parallel
name: Audit pipeline validation coverage
description: |
  Audit the data pipeline's validation logic in pipeline/ingest.py and ensure all
  edge cases are handled. Currently, the validate_record function checks for required
  fields and numeric values, but doesn't validate:
  1. Record IDs must be non-empty strings
  2. Timestamps must not be in the future
  3. Values must be non-negative

  Add these three validation checks to validate_record. Also add a new validation
  stats method to IngestStats that returns a summary dict.

  Requirements:
  - Validation happens ONLY in the ingest layer
  - Use IngestRecord dataclass (frozen, immutable)
  - Use Protocol pattern for interfaces (no ABC)
  - Do NOT use pandas
codebase: pipeline_app
conversation: pipeline_session
relevant_files:
  - pipeline/ingest.py
  - pipeline/transform.py
expected_patterns:
  - ValidationError
  - IngestRecord
  - Protocol
  - frozen
forbidden_patterns:
  - pandas
  - DataFrame
  - ABC
  - abstractmethod
ground_truth_patch: |
  def validate_record(raw: dict[str, Any], source_name: str, index: int) -> IngestRecord:
      for f in REQUIRED_FIELDS:
          if f not in raw:
              raise ValidationError(source_name, index, f"Missing required field: {f}")

      record_id = str(raw["id"])
      if not record_id.strip():
          raise ValidationError(source_name, index, "Record ID must be non-empty")

      if not isinstance(raw["value"], (int, float)):
          raise ValidationError(source_name, index, f"'value' must be numeric, got {type(raw['value']).__name__}")

      if raw["value"] < 0:
          raise ValidationError(source_name, index, f"'value' must be non-negative, got {raw['value']}")

      try:
          ts = datetime.fromisoformat(raw["timestamp"]) if isinstance(raw["timestamp"], str) else raw["timestamp"]
      except (ValueError, TypeError) as e:
          raise ValidationError(source_name, index, f"Invalid timestamp: {e}") from e

      if ts > datetime.now():
          raise ValidationError(source_name, index, f"Timestamp must not be in the future: {ts}")

      return IngestRecord(
          source=source_name,
          timestamp=ts,
          payload=raw,
          record_id=record_id,
      )
partitions:
  - agent_id: a
    description: |
      Add the three new validation checks to validate_record in pipeline/ingest.py:
      non-empty ID, no future timestamps, non-negative values.
    relevant_files:
      - pipeline/ingest.py
  - agent_id: b
    description: |
      Add a summary() method to IngestStats and verify the transform layer
      doesn't duplicate any validation logic.
    relevant_files:
      - pipeline/transform.py
merge_instruction: |
  Combine the validation additions with the IngestStats enhancement. Verify
  the transform layer remains validation-free.
