id: sequential_debug_001
type: sequential
name: Fix stock adjustment bug
description: |
  The Product.adjust_stock method doesn't properly handle the case where multiple
  order items reference the same product in a single order. When two OrderItems
  both reference product SKU-001 with quantities 3 and 5, the stock should decrease
  by 8 total. Fix the create_order method in services/transaction.py to handle this
  correctly, ensuring stock validation happens against the cumulative quantity.

  Requirements:
  - Use SQLAlchemy ORM (no raw SQL)
  - Maintain observer pattern for events
  - Do NOT add caching to the transaction layer
  - 'User' means the Customer model
codebase: inventory_app
conversation: inventory_session
relevant_files:
  - models/stock.py
  - services/transaction.py
  - events/notifications.py
expected_patterns:
  - adjust_stock
  - SQLAlchemy
  - observer
  - Customer
forbidden_patterns:
  - raw SQL
  - execute(
  - "@cache"
  - lru_cache
  - discount
ground_truth_patch: |
  def create_order(self, customer: Customer, items: list[dict[str, int | float]]) -> Order:
      order = Order(customer_id=customer.id, status="pending")
      self._session.add(order)
      self._session.flush()

      # Aggregate quantities per product to validate cumulative stock
      qty_by_product: dict[int, int] = {}
      for item_data in items:
          pid = int(item_data["product_id"])
          qty_by_product[pid] = qty_by_product.get(pid, 0) + int(item_data["quantity"])

      for product_id, total_qty in qty_by_product.items():
          product = self._session.get(Product, product_id)
          if product is None:
              raise ValueError(f"Product not found: {product_id}")
          product.adjust_stock(-total_qty)
          if product.is_low_stock():
              self._notify("on_stock_low", product=product)

      for item_data in items:
          product = self._session.get(Product, item_data["product_id"])
          order_item = OrderItem(
              order_id=order.id,
              product_id=product.id,
              quantity=int(item_data["quantity"]),
              unit_price=product.price,
          )
          self._session.add(order_item)

      self._session.flush()
      self._notify("on_order_created", order=order)
      return order
partitions:
  - agent_id: a
    description: |
      Fix the stock model to support batch adjustments. Ensure Product.adjust_stock
      works correctly when called with a cumulative quantity.
    relevant_files:
      - models/stock.py
  - agent_id: b
    description: |
      Fix the transaction service to aggregate quantities per product before
      adjusting stock. Ensure observer notifications still fire correctly.
    relevant_files:
      - services/transaction.py
      - events/notifications.py
merge_instruction: |
  Combine the model fix with the service fix. Ensure the stock model changes
  are compatible with how the transaction service calls adjust_stock.
