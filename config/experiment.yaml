experiment_name: context_dilution_v1

# Subject model — the model being tested for context dilution
subject_backend: openai
subject_model: qwen2.5-coder:14b
subject_base_url: http://localhost:11434/v1
subject_api_key: ollama

# Judge model — evaluates outputs (MUST be different family from subject)
judge_backend: openai
judge_model: gpt-oss:20b
judge_base_url: http://localhost:11434/v1
judge_api_key: ollama

# Summarizer model — generates conversation summaries
summarizer_backend: openai
summarizer_model: llama3.2:latest
summarizer_base_url: http://localhost:11434/v1
summarizer_api_key: ollama

# Temperature — set to 0 for reproducibility
subject_temperature: 0.0
judge_temperature: 0.0
summarizer_temperature: 0.0

# Trial design
trials_per_cell: 15
judge_replicas: 3
budget_limit_usd: 30.0

# API features (anthropic backend only, ignored for openai backend)
use_batch_api: false
use_prompt_caching: false
max_output_tokens: 4096
context_window: 16384  # Ollama num_ctx — must fit system + conversation + output

# Factorial design
agent_configs:
  - single
  - multi_2
context_conditions:
  - full
  - summarized
  - partitioned
  - minimal
task_types:
  - sequential
  - parallel
  - creative
